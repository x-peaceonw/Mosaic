<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mosaic</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700&family=Source+Serif+4:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="masthead">

<div class="masthead__editionbar">
<span>MORNING EDITION</span>
<span>•</span>
<span>NO ADS</span>
<span>•</span>
<span>NO ALGORITHM</span>
</div>

<h1 class="masthead__title">MOSAIC</h1>

<p class="masthead__tagline">
Your personalized newspaper.
</p>

<input
id="search"
type="text"
placeholder="Search..."
>

</header>

<nav class="tabs">

<button onclick="filterPosts('All')">All</button>
<button onclick="filterPosts('Music')">Music</button>
<button onclick="filterPosts('Movies')">Movies</button>
<button onclick="filterPosts('Sports')">Sports</button>
<button onclick="filterPosts('Books')">Books</button>
<button onclick="filterPosts('Shopping')">Shopping</button>

</nav>

<main id="feed"></main>

<script src="script.js"></script>

</body>
</html>
