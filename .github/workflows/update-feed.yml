name: Update Mosaic Feed

on:
  schedule:
    - cron: "0 6 * * *"   # every day at 6am UTC — change as you like
  workflow_dispatch:        # lets you trigger it manually from GitHub too

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests python-dotenv

      - name: Fetch new releases
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        run: python update_feed.py

      - name: Commit updated feed
        run: |
          git config user.name "mosaic-bot"
          git config user.email "bot@mosaic.local"
          git add data/music.json
          git diff --staged --quiet || git commit -m "Update feed"
          git push
